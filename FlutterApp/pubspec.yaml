name: smart_agriculture
description: Smart AI-Powered Agriculture System for Pakistani Farmers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API (REMOVED http, keeping only Dio)
  dio: ^5.4.3
  
  # Local Storage
  shared_preferences: ^2.2.3
  
  # Charts & Visualization
  fl_chart: ^0.71.0
  
  # Date & Time
  intl: ^0.20.2
  
  # Icons (REMOVED font_awesome - use built-in Icons or cupertino_icons)
  
  # Loading (REMOVED lottie and shimmer - will use simple alternatives)
  
  # Utils
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true