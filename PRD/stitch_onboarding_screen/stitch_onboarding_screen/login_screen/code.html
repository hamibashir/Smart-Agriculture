<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SmartAgri - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

              "surface-container-low": "#f3f4f5",
              "inverse-primary": "#4ae176",
              "inverse-on-surface": "#f0f1f2",
              "on-primary": "#ffffff",
              "secondary": "#2f6a3c",
              "secondary-fixed": "#b2f2b7",
              "surface-bright": "#f8f9fa",
              "primary-container": "#22c55e",
              "error": "#ba1a1a",
              "on-primary-fixed": "#002109",
              "on-tertiary-fixed": "#410001",
              "on-secondary": "#ffffff",
              "on-error-container": "#93000a",

<style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
        input:focus {
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface flex flex-col min-h-screen selection:bg-primary-container selection:text-white">
<main class="flex-grow flex flex-col items-center justify-start pt-12 pb-24 px-6 md:px-12 max-w-lg mx-auto w-full">
<!-- Brand Identity / Header Section -->
<div class="w-full mb-12 animate-fade-in">
<div class="inline-flex items-center justify-center bg-primary-container/10 p-3 rounded-2xl mb-8">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="potted_plant">potted_plant</span>
</div>
<h1 class="text-4xl font-extrabold tracking-tighter text-primary mb-2">Welcome Back 👋</h1>
<p class="text-on-surface-variant font-medium opacity-70">Sign in to manage your fields</p>
</div>
<!-- Hero Decorative Element (Bento-style visual) -->
<div class="w-full mb-10 overflow-hidden rounded-lg bg-surface-container-low h-48 relative shadow-sm">
<img alt="Agricultural fields" class="w-full h-full object-cover opacity-90 mix-blend-multiply" data-alt="Cinematic wide shot of rolling emerald green crop fields at sunrise with soft morning mist and warm golden backlighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqr_WTH1XY3iy6TgqgiLn3oPWD6z5iHK7_b7cexSmdoHNDeWRcbUdokkr59Auwk-rk64-_wZlOdOuG0cqtJE9KnkboRrEQHXOiVq7ZS5IP7GGHpq9tD4__XX1if9zGcwt4-_GyphSBrt1Y6YbkyxUEdXz5heihiSHpKbc2dzrGBFenYvJrWiyS9IE2fy3msnNjwad7i4hxfgOHzJc7vN6AlqsGf5wxEB12EVOy_NlXgsyntqkJcmMvTyKl9DNkdrACnBdZGts9b6o"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-low via-transparent to-transparent"></div>
<div class="absolute bottom-4 left-4 right-4 p-4 rounded-xl custom-glass border border-white/20">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="monitoring">monitoring</span>
<span class="text-xs font-bold uppercase tracking-widest text-primary">Live Precision Data Active</span>
</div>
</div>
</div>
<!-- Login Form -->
<div class="w-full space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant ml-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="w-full bg-surface-container-lowest border-2 border-outline-variant/20 rounded-md py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 focus:border-primary-container focus:ring-0 transition-all duration-300" placeholder="farmer@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant ml-1">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border-2 border-outline-variant/20 rounded-md py-4 pl-12 pr-12 text-on-surface placeholder:text-outline/50 focus:border-primary-container focus:ring-0 transition-all duration-300" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</div>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between text-sm py-1">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-5 h-5 rounded border-outline-variant/50 text-primary-container focus:ring-primary-container/20 transition-all cursor-pointer" type="checkbox"/>
<span class="text-on-surface-variant font-medium group-hover:text-primary transition-colors">Remember me</span>
</label>
<a class="text-primary font-bold hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
<!-- Action Button -->
<div class="pt-2">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white font-bold py-5 rounded-full shadow-lg shadow-primary-container/20 active:scale-[0.98] hover:scale-[1.01] transition-all flex items-center justify-center gap-2">
<span>Sign In</span>
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Secondary Actions -->
<div class="flex items-center gap-4 py-4">
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
<span class="text-xs font-bold text-outline uppercase tracking-widest">Or continue with</span>
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center py-3 px-6 rounded-full border border-outline-variant/20 bg-surface-container-lowest hover:bg-surface-container-low transition-colors">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBJgYi83wpEVb_-ZlVf6UMR4B_TbVZ3p6Gqw40F6vTPQW2EUn6MLiQq_PgEpQjLTlgxMLLvRG86r_tv7jSwjzpo8GROHAvKVSHVonnzhka2tZ-gjXBHcZeiJcOYT2kS_tfu8SGJPNx-NmLDLi69GSQRYjudBDnMPvKWVhc8PROoD_hc6VLbxy10eZLmWbVfCTLOkZbH_3WMvOo4_B3QZjIIUPpMHIdzJCMopReSpam3lFdhaO1AeWt8zwrLd23uB1CK0jMv949WzZg"/>
</button>
<button class="flex items-center justify-center py-3 px-6 rounded-full border border-outline-variant/20 bg-surface-container-lowest hover:bg-surface-container-low transition-colors">
<img alt="Apple" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCOF2oZDxzpjTLFUhlAzV4ON6m9F6XSTOr5tu3A8vt5w55ggIRxykEZvq5c9A6hgtULXyVLrzuv3GGFzPiyQKd97FMXhfoxwpybBYvs24vxf-L_LHYPYKNO7WCKo9PemYblKCTl2T9ytE_EN2U5Ah8kFsbJ8wpz8vUmO-pYYlGSPbuBBlFI--L-f_gHeTdlv7svHtd3HqdW8ZwIJEWYlnC0L5P3cHFxS1ZMuGFuFPlddZcxrUuaZMYlsupdbIouHJ8WBcFWkX5JWAs"/>
</button>
</div>
</div>
<!-- Footer -->
<footer class="mt-auto pt-12 pb-6 flex items-center gap-2 justify-center">
<span class="text-on-surface-variant font-medium">Don't have an account?</span>
<a class="text-primary font-extrabold hover:underline transition-all" href="#">Sign Up</a>
</footer>
</main>
<!-- Global Visual Consistency elements (Non-interactive subtle background shapes) -->
<div class="fixed top-0 right-0 -z-10 opacity-10 pointer-events-none">
<div class="w-[500px] h-[500px] rounded-full bg-primary blur-[120px] translate-x-1/2 -translate-y-1/2"></div>
</div>
<div class="fixed bottom-0 left-0 -z-10 opacity-5 pointer-events-none">
<div class="w-[400px] h-[400px] rounded-full bg-secondary blur-[100px] -translate-x-1/2 translate-y-1/2"></div>
</div>
</body></html>
