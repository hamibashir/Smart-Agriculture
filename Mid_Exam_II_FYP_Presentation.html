<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mid Exam II - Smart AI Powered Agriculture System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #102118;
      --muted: #607268;
      --line: #d8e7dd;
      --brand: #1f9d55;
      --brand-2: #0d7c66;
      --blue: #2563eb;
      --amber: #d97706;
      --red: #dc2626;
      --dark: #07140f;
      --soft: #f5fbf6;
      --panel: #ffffff;
    }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ecfdf3, #eff6ff);
      color: var(--ink);
      overflow: hidden;
    }
    .slides-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity .55s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide.active { opacity: 1; z-index: 10; pointer-events: auto; }
    .reveal-block {
      opacity: 0;
      transform: translateY(20px) scale(.992);
      pointer-events: none;
      transition: opacity .52s ease, transform .52s cubic-bezier(.22, 1, .36, 1);
      will-change: opacity, transform;
    }
    .reveal-block.revealed {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .slide-content {
      width: 100vw;
      height: 100vh;
      padding: 48px 7vw 96px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      background:
        linear-gradient(90deg, rgba(31,157,85,.055) 1px, transparent 1px),
        linear-gradient(rgba(31,157,85,.045) 1px, transparent 1px),
        #ffffff;
      background-size: 48px 48px;
    }
    .title-slide {
      justify-content: center;
      background:
        radial-gradient(circle at 74% 22%, rgba(134,239,172,.25), transparent 28%),
        radial-gradient(circle at 14% 76%, rgba(59,130,246,.22), transparent 24%),
        linear-gradient(135deg, #06120d 0%, #123d2a 56%, #0f172a 100%);
      color: white;
    }
    .title-slide p { color: #d9fbe3; }
    .eyebrow {
      color: #bbf7d0;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-weight: 900;
      margin-bottom: 14px;
    }
    h1 {
      font-size: clamp(2rem, 3.7vw, 4.5rem);
      line-height: 1.06;
      letter-spacing: 0;
      margin-bottom: 18px;
    }
    .slide-content > h1 {
      font-size: clamp(1.8rem, 2.8vw, 3rem);
      color: var(--dark);
      padding-bottom: 14px;
      border-bottom: 4px solid var(--brand);
    }
    h2 {
      color: var(--brand-2);
      font-size: clamp(1.15rem, 1.7vw, 1.55rem);
      margin: 14px 0 10px;
    }
    h3 { font-size: 1rem; margin-bottom: 8px; color: var(--ink); }
    p, li, td, th {
      font-size: .98rem;
      line-height: 1.5;
      color: var(--muted);
    }
    ul { padding-left: 20px; }
    li { margin-bottom: 7px; }
    .hero-grid, .grid {
      display: grid;
      gap: 16px;
      margin-top: 16px;
    }
    .hero-grid { grid-template-columns: 1.1fr .9fr; align-items: center; gap: 34px; }
    .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(16, 33, 24, .08);
    }
    .card.dark {
      background: var(--dark);
      border-color: rgba(255,255,255,.18);
      color: white;
    }
    .card.dark h2, .card.dark h3 { color: #86efac; }
    .card.dark p, .card.dark li { color: #d1fae5; }
    .tag, .status {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e8f8ed;
      color: #146c3e;
      border: 1px solid #bfeacc;
      font-size: .8rem;
      font-weight: 900;
      white-space: nowrap;
    }
    .status.pass { background: #dcfce7; color: #166534; border-color: #86efac; }
    .status.warn { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .flow {
      display: flex;
      align-items: stretch;
      gap: 10px;
      flex-wrap: wrap;
      margin: 14px 0;
    }
    .node {
      min-width: 128px;
      flex: 1;
      background: #f8fffa;
      border: 1px solid var(--line);
      border-left: 5px solid var(--brand);
      border-radius: 8px;
      padding: 12px;
      position: relative;
      overflow: hidden;
    }
    .node::after {
      content: "";
      position: absolute;
      left: -45%;
      top: 0;
      width: 42%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(31,157,85,.14), transparent);
      animation: scan 3.2s infinite;
    }
    .arrow {
      align-self: center;
      color: var(--brand);
      font-weight: 900;
      font-size: 1.35rem;
    }
    @keyframes scan {
      0% { transform: translateX(0); }
      60%, 100% { transform: translateX(420%); }
    }
    .mini-screen {
      border: 8px solid #111827;
      border-radius: 24px;
      background: #f9fafb;
      overflow: hidden;
      min-height: 320px;
      box-shadow: 0 16px 34px rgba(0,0,0,.16);
    }
    .mini-top {
      background: var(--brand);
      color: white;
      padding: 13px 15px;
      font-weight: 900;
    }
    .mini-body { padding: 14px; }
    .screen-row {
      height: 30px;
      margin-bottom: 9px;
      border-radius: 6px;
      background: #e5f7ea;
      border-left: 4px solid var(--brand);
    }
    .bar {
      height: 10px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
      margin-top: 8px;
    }
    .bar span {
      display: block;
      width: var(--w, 70%);
      height: 100%;
      background: linear-gradient(90deg, var(--brand), var(--blue));
      animation: grow 1s ease both;
    }
    @keyframes grow { from { width: 0; } to { width: var(--w, 70%); } }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      margin-top: 16px;
    }
    th, td {
      padding: 10px 11px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th { background: var(--dark); color: white; }
    tr:last-child td { border-bottom: 0; }
    .trace-step {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      margin: 14px 0;
    }
    .trace-step div {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      min-height: 74px;
    }
    .trace-step strong { color: var(--brand-2); display: block; font-size: .86rem; margin-bottom: 5px; }
    .test-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 16px;
    }
    .comparison {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 16px;
    }
    .expected { border-left: 5px solid var(--blue); }
    .actual { border-left: 5px solid var(--brand); }
    .roadmap-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    .roadmap-item {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 12px;
      align-items: center;
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .metric strong {
      display: block;
      color: var(--brand);
      font-size: 2rem;
      line-height: 1;
      margin-top: 6px;
    }
    .nav-buttons {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
    }
    .nav-btn {
      background: white;
      border: 2px solid var(--brand);
      color: var(--brand);
      padding: 11px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 900;
      transition: all .25s;
    }
    .nav-btn:hover { background: var(--brand); color: white; transform: translateY(-2px); }
    .slide-counter, .section-label {
      position: fixed;
      z-index: 101;
      background: rgba(255,255,255,.94);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 900;
      color: var(--brand-2);
    }
    .slide-counter { right: 28px; bottom: 28px; }
    .section-label { right: 28px; top: 20px; }
    .progress {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: rgba(31,157,85,.16);
      z-index: 102;
    }
    .progress span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--brand), var(--blue));
      transition: width .3s ease;
    }
    @media (max-width: 900px) {
      .slide-content { padding: 40px 5vw 96px; }
      .hero-grid, .cols-2, .cols-3, .cols-4, .test-grid, .comparison, .trace-step { grid-template-columns: 1fr; }
      .roadmap-item { grid-template-columns: 1fr; }
      .arrow { display: none; }
      .section-label { display: none; }
    }
  </style>
</head>
<body>
  <div class="slides-container" id="slidesContainer"></div>

  <div class="section-label" id="sectionLabel">Title</div>
  <div class="nav-buttons">
    <button class="nav-btn" onclick="previousSlide()">← Previous</button>
    <button class="nav-btn" onclick="nextSlide()">Next →</button>
  </div>
  <div class="slide-counter"><span id="slideNumber">1</span> / <span id="totalSlides"></span></div>
  <div class="progress"><span id="progressBar"></span></div>

  <script>
    const epics = [
      {
        id: 'E1',
        name: 'User Authentication and Profile Management',
        description: 'Secure registration, login, and profile management so user data and farm configurations remain private and secure.',
        layer: 'Application Layer + Backend Layer + Database Layer',
        stories: [

            database: 'users table: full_name, email, phone, password_hash, city/province, role, is_active.',
            workflow: ['Register Form', 'POST /api/auth/register', 'Validate + bcrypt hash', 'Insert users row', 'Return token/user'],

              id: 'TC-E1-US1-01',

              expected: 'A new user account should be created successfully in the users table and the user should be redirected to the login page.',
              actual: 'User account was created successfully and redirected to the login page correctly.',
              status: 'PASS'
            }
          },
          {
            id: 'E1-US2',
            title: 'Secure Login',

            goal: 'Authenticate the farmer and establish a protected mobile session.',
            ui: 'Login screen captures email and password and routes successful users to dashboard.',
            backend: 'Auth controller loads user by email, checks active status, compares bcrypt password, signs JWT.',
            database: 'users table supplies credentials and last_login is updated.',
            workflow: ['Login Form', 'POST /api/auth/login', 'bcrypt compare', 'JWT generation', 'Dashboard access'],
            realtime: 'JWT is used by protected module APIs after login.',
            architecture: 'Flutter App -> Auth API -> JWT Middleware -> Protected Routes',
            test: {
              id: 'TC-E1-US2-01',
              pre: 'User account already exists in the system database.',
              input: 'Email = ali@test.com; Password = Pass123.',
              expected: 'System authenticates the user, generates JWT token, and redirects to dashboard with HTTP 200 OK response.',
              actual: 'User was authenticated successfully and dashboard loaded correctly with valid JWT token.',
              status: 'PASS'
            }
          },
          {
            id: 'E1-US3',
            title: 'Profile Management',

            ui: 'Settings/Profile page displays user details and update actions.',
            backend: 'Profile update controller updates full name, phone, address, city, province, and postal code for authenticated user.',
            database: 'users table updated by user_id from JWT context.',
            workflow: ['Profile Screen', 'PUT /api/auth/profile', 'JWT user lookup', 'Update users row', 'Success response'],
            realtime: 'Profile changes are reflected on subsequent profile/dashboard loads.',
            architecture: 'Flutter Profile UI -> Auth Middleware -> users table',
            test: {
              id: 'TC-E1-US3-01',
              pre: 'User is logged in and profile screen is accessible.',
              input: 'Updated Phone = +923009876543.',
              expected: 'Updated profile information should be saved in the users table and success message should be displayed.',
              actual: 'Profile information was updated successfully and success message was displayed.',
              status: 'PASS'
            }
          }
        ]
      },
      {
        id: 'E2',
        name: 'Real-Time Sensor Data Monitoring',
        description: 'Monitor soil moisture, temperature, humidity, light, rainfall, and sensor status so farmers can make informed crop-care decisions.',
        layer: 'Device Layer + Connectivity Layer + Backend Layer + Application Layer',
        stories: [
          {
            id: 'E2-US1',
            title: 'View Field Overview',
            description: 'As a farmer, the user wants to see a list of all fields with their current status so that the overall farm health can be assessed quickly.',
            goal: 'Display field-level summary indicators on dashboard.',
            ui: 'Dashboard and field list show registered fields, summary readings, and condition labels.',
            backend: 'Dashboard stats API counts fields/sensors/alerts and returns latest field conditions.',
            database: 'fields, sensors, sensor_readings, alerts, crop_recommendations.',
            workflow: ['Dashboard opens', 'GET /api/dashboard/stats', 'Aggregate counts', 'Fetch latest reading', 'Render field overview'],
            realtime: 'Latest reading is selected by reading_time so recent ESP32 telemetry drives dashboard state.',
            architecture: 'Flutter Dashboard -> Dashboard API -> MySQL joins across fields/sensors/readings',
            test: {
              id: 'TC-E2-US1-01',
              pre: 'User is logged in and fields are registered in the system.',
              input: 'User opens the dashboard screen.',
              expected: 'Dashboard should display all registered fields with status indicators such as Healthy or Needs Water.',
              actual: 'Registered fields were displayed successfully with correct status indicators.',
              status: 'PASS'
            }
          },
          {
            id: 'E2-US2',
            title: 'Detailed Sensor Readings',
            description: 'As a farmer, the user wants to view specific readings from individual sensors so that issues in specific areas can be pinpointed.',
            goal: 'Show latest sensor values received from ESP32.',
            ui: 'Detailed Sensor Data Page displays soil moisture, temperature, humidity, light, rainfall, and pump state.',
            backend: 'Sensor APIs return latest and historical readings for owned sensors.',
            database: 'sensor_readings stores timestamped telemetry from ESP32.',
            workflow: ['Sensor samples field', 'ESP32 POST /api/sensors/reading', 'Insert sensor_readings', 'GET latest reading', 'UI updates values'],
            realtime: 'Firmware reads sensors every 1 second and uploads full telemetry every 30 seconds.',
            architecture: 'Sensors -> ESP32 Wi-Fi -> Sensor API -> sensor_readings -> Mobile UI',
            test: {
              id: 'TC-E2-US2-01',
              pre: 'ESP32 device is connected and sending telemetry to backend server.',
              input: 'Sensor ID = 14; Moisture = 45%; Temperature = 30C.',
              expected: 'Dashboard should display updated moisture and temperature values matching the sensor readings stored in the database.',
              actual: 'Dashboard displayed Moisture: 45% and Temperature: 30C correctly.',
              status: 'PASS'
            }
          },
          {
            id: 'E2-US3',
            title: 'Sensor Status Monitoring',
            description: 'As a farmer, the user wants to know if a sensor is offline or has low battery so that maintenance can be performed.',

            ui: 'Dashboard/Sensor page shows online/offline indicator and sensor details.',
            backend: 'Sensor listing API returns active sensors and latest timestamps for field context.',
            database: 'sensors table stores device_id, is_active, battery_level, firmware_version; sensor_readings timestamps show recency.',

            realtime: 'Telemetry freshness determines whether sensor appears healthy or offline.',
            architecture: 'ESP32 telemetry heartbeat -> MySQL timestamps -> Flutter status indicator',
            test: {
              id: 'TC-E2-US3-01',
              pre: 'Sensor is registered in the system and dashboard is accessible.',
              input: 'Sensor ID = 14 stops sending telemetry data.',

      },
      {
        id: 'E3',
        name: 'Intelligent Irrigation Control',
        description: 'Control irrigation manually and automatically based on sensor thresholds so water usage is optimized and crops receive adequate hydration.',
        layer: 'Device Layer + Backend Layer + Database Layer + Mobile App',
        stories: [
          {
            id: 'E3-US1',
            title: 'Manual Irrigation Toggle',

            backend: 'Irrigation start/stop APIs write pump_status into irrigation_logs and create instant sensor_readings for dashboard sync.',

            workflow: ['Tap Start', 'POST /api/irrigation/start', 'Insert log pump_status=on', 'ESP32 polls command', 'Relay turns pump ON'],
            realtime: 'ESP32 polls command endpoint every 5 seconds and syncs active-low relay state.',
            architecture: 'Flutter Irrigation UI -> Irrigation API -> irrigation_logs -> ESP32 command poll -> Relay',
            test: {
              id: 'TC-E3-US1-01',
              pre: 'ESP32 device and relay module are connected and operational.',
              input: 'User clicks Start Irrigation button for Field ID = 6.',
              expected: 'System should activate the relay, update pump status to ON, and create a new irrigation log entry.',
              actual: 'Pump activated successfully and irrigation status updated correctly in the application.',
              status: 'PASS'
            }
          },
          {
            id: 'E3-US2',
            title: 'Threshold-Based Automation',
            description: 'As a farmer, the user wants to set a soil moisture threshold so that the system automatically irrigates when the soil becomes too dry.',
            goal: 'Automatically start irrigation when soil moisture falls below threshold.',
            ui: 'Irrigation panel reflects automatic pump state and low-moisture trigger.',
            backend: 'Sensor ingestion priority chain checks rain, wet soil, manual commands, then dry-soil auto-start.',
            database: 'sensor_readings captures moisture; irrigation_logs records automatic event; alerts records low-moisture warning.',
            workflow: ['Moisture below 30%', 'Backend auto_dry decision', 'Insert automatic log', 'Return pump_status=1', 'Relay ON'],
            realtime: 'Firmware also has offline logic and local rain safety so pump behavior remains safe during network loss.',
            architecture: 'Sensor threshold -> Backend decision engine -> DB log + alert -> ESP32 relay command',
            test: {
              id: 'TC-E3-US2-01',
              pre: 'Auto-irrigation mode is enabled and threshold is configured.',
              input: 'Threshold = 30%; Simulated Moisture Reading = 25%.',
              expected: 'System should automatically activate irrigation pump and generate a low moisture alert notification.',
              actual: 'Irrigation triggered automatically and alert notification generated successfully.',
              status: 'PASS'
            }

          {
            id: 'E3-US3',
            title: 'Irrigation Logging',
            description: 'As a farmer, the user wants to see a history of irrigation events so that water usage can be tracked.',
            goal: 'Record and display every irrigation cycle.',
            ui: 'Detailed sensor/history or irrigation screen lists pump events with timing and duration.',

      {
        id: 'E4',
        name: 'AI-Driven Crop Recommendations',
        description: 'Generate AI crop recommendations from soil and weather analysis so yield can be maximized and suitable seasonal crops can be selected.',

        stories: [
          {
            id: 'E4-US1',
            title: 'Request Crop Recommendation',

              status: 'PASS'
            }
          },
          {
            id: 'E4-US2',

            workflow: ['Model predicts', 'Compute max probability', 'Return confidence_score', 'Store DB record', 'Display percentage'],
            realtime: 'Confidence is produced during AI inference and displayed immediately after recommendation.',
            architecture: 'AI model probability -> Backend response -> DB persistence -> Flutter result card',
            test: {
              id: 'TC-E4-US2-01',
              pre: 'Crop recommendation has been generated successfully.',

          {
            id: 'E4-US3',

            description: 'As a farmer, the user wants to mark a recommendation as Accepted so that the system tracks what has actually been planted.',

    function buildDeck() {

      slides = document.querySelectorAll('.slide');

    function getRevealBlocks(slide) {
      return Array.from(slide.querySelectorAll('.reveal-block'));
    }

    function prepareRevealBlocks() {
      slides.forEach(slide => {
        const content = slide.querySelector(':scope > .slide-content');
        if (!content) return;
        Array.from(content.children).forEach(child => {
          if (child.matches('h1')) return;
          child.classList.add('reveal-block');
        });
      });
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function smoothScrollContainer(container, targetTop, duration = 720) {
      const startTop = container.scrollTop;
      const distance = Math.max(0, targetTop) - startTop;
      if (Math.abs(distance) < 2) return;

      const startTime = performance.now();
      function step(now) {
        const elapsed = now - startTime;
        const progress = Math.min(1, elapsed / duration);
        container.scrollTop = startTop + distance * easeInOutCubic(progress);
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function scrollActiveBlockIntoView(slide, block) {
      if (!block) return;
      const content = slide.querySelector(':scope > .slide-content');
      const scrollTarget = block.matches('h1') ? block : block;
      window.setTimeout(() => requestAnimationFrame(() => {
        if (content) {
          const contentRect = content.getBoundingClientRect();
          const blockRect = scrollTarget.getBoundingClientRect();
          const targetTop = content.scrollTop
            + (blockRect.top - contentRect.top)
            - (content.clientHeight / 2)
            + (blockRect.height / 2);

          smoothScrollContainer(content, targetTop);
          return;
        }

        scrollTarget.scrollIntoView({
          behavior: 'smooth',
          block: 'center',
          inline: 'nearest'
        });
      }), 90);
    }

    function applyBlockState(slide, targetBlock, shouldScroll = true) {
      const blocks = getRevealBlocks(slide);
      if (blocks.length === 0) {
        currentBlock = 0;
        return;
      }
      currentBlock = Math.max(0, Math.min(targetBlock, blocks.length - 1));
      blocks.forEach((block, index) => {
        block.classList.toggle('revealed', index <= currentBlock);
      });
      if (shouldScroll) scrollActiveBlockIntoView(slide, blocks[currentBlock]);
    }

    function showSlide(n, blockMode = 'start') {
      if (n > slides.length) currentSlide = 1;
      if (n < 1) currentSlide = slides.length;
      slides.forEach(slide => slide.classList.remove('active'));
      const activeSlide = slides[currentSlide - 1];
      activeSlide.classList.add('active');
      const blocks = getRevealBlocks(activeSlide);
      const targetBlock = blockMode === 'end' ? blocks.length - 1 : 0;
      applyBlockState(activeSlide, targetBlock);
      document.getElementById('slideNumber').textContent = currentSlide;
      document.getElementById('sectionLabel').textContent = activeSlide.dataset.section || '';
      document.getElementById('progressBar').style.width = `${(currentSlide / slides.length) * 100}%`;
    }

    function nextSlide() {
      const activeSlide = slides[currentSlide - 1];
      const blocks = getRevealBlocks(activeSlide);
      if (blocks.length && currentBlock < blocks.length - 1) {
        applyBlockState(activeSlide, currentBlock + 1);
        return;
      }
      currentSlide++;
      showSlide(currentSlide, 'start');
    }

    function previousSlide() {
      const activeSlide = slides[currentSlide - 1];
      const blocks = getRevealBlocks(activeSlide);
      if (blocks.length && currentBlock > 0) {
        applyBlockState(activeSlide, currentBlock - 1);
        return;
      }
      currentSlide--;
      showSlide(currentSlide, 'end');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
      if (e.key === 'ArrowLeft') previousSlide();
      if (e.key === 'Home') { currentSlide = 1; showSlide(currentSlide); }
      if (e.key === 'End') { currentSlide = slides.length; showSlide(currentSlide); }
    });

    buildDeck();
    showSlide(currentSlide);
  </script>
